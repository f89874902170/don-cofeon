<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предзаказ</title>
    <style>
        :root {
            --primary-red: #f0d7b1;
            --header-footer-bg: black;
            --text-color-light: white;
            --fon-png-bg: #f0d7b1; /* Цвет фона для fon.png, похожий на бежевый */
            --map-bg: #d3e8e4; /* Цвет фона для карты */
            --font-family: 'Times New Roman', serif;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            background-color: var(--primary-red);
            color: var(--text-color-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background-color: var(--header-footer-bg);
            color: var(--text-color-light);
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .header-logo {
            display: flex;
            align-items: center;
        }

        .header-logo img {
            height: 35px;
            margin-right: 15px;
        }

        .header-logo span {
            font-size: 22px;
            font-weight: bold;
        }

        /* Стили для ссылок в шапке (всегда белые) */
        .header a {
            color: var(--text-color-light) !important;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .header a:hover {
            color: #ddd !important;
            text-decoration: underline;
        }

        .header-vk-icon img {
            height: 25px;
            margin-left: 15px;
            vertical-align: middle;
            filter: brightness(0) invert(1); /* Делает изображение белым */
        }

        @media (max-width: 768px) {
            .header-vk-icon img {
                 filter: none; /* Убираем фильтр, если он мешает */
            }
         }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: row; /* Строчное расположение для больших экранов */
            align-items: stretch; /* Растягиваем по высоте */
            padding-top: 30px;
            padding-bottom: 30px;
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .left-form-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 0 40px;
            max-width: 600px;
            text-align: left;
            box-sizing: border-box;
        }

        .left-form-panel h1 {
            font-size: 70px; /* Уменьшаем размер заголовка "Предзаказ" */
            margin-bottom: 40px;
            line-height: 1;
            color: var(--text-color-light);
        }

        .form-group {
            margin-bottom: 25px;
            width: 100%; /* Поле занимает всю ширину родителя */
        }

        .form-group label {
            display: block;
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--text-color-light);
        }

        .form-group input[type="text"],
        .form-group input[type="tel"] {
            width: 100%;
            padding: 15px 25px;
            font-size: 22px;
            border: none;
            border-radius: 30px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
            border: 1px solid #ddd;
            box-sizing: border-box;
            color: #333;
        }

        .form-group input[type="text"]::placeholder,
        .form-group input[type="tel"]::placeholder {
            color: #aaa;
        }

        .form-group input[type="submit"] {
            width: 150px; /* Фиксированная ширина кнопки */
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
            color: black; /* Текст "готово!" черный */
            background-color: #f0d7b1; /* Фон кнопки, похожий на fon.png */
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
            transition: background-color 0.3s ease, transform 0.3s ease;
            text-align: center;
            margin-top: 20px; /* Отступ от предыдущего поля */
        }

        .form-group input[type="submit"]:hover {
            background-color: #e8c8a5; /* Немного темнее при наведении */
            transform: translateY(-3px);
        }

        .right-image-panel {
            width: 50%;
            height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            background-color: #bc3030;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            flex-shrink: 0;
        }

        .right-image-panel .fon-image {
            width: 100%;
            max-width: 400px; /* Ограничение ширины изображения */
            height: auto;
            display: block;
            margin-bottom: 20px; /* Отступ под изображением */
        }

        .right-image-panel .map-image {
            width: 100%;
            max-width: 400px; /* Ограничение ширины карты */
            height: auto;
            display: block;
            border-radius: 15px; /* Скругление углов карты */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .footer {
            background-color: var(--header-footer-bg);
            color: var(--text-color-light);
            padding: 25px 30px;
            font-size: 16px;
            text-align: center;
            margin-top: auto;
            width: 100%;
            box-sizing: border-box;
        }

        .footer p {
            margin: 5px 0;
        }

        /* Адаптивность */
        @media (max-width: 1200px) {
            .main-content {
                flex-direction: column;
                align-items: center;
            }

            .left-form-panel {
                max-width: 100%;
                padding: 0 20px;
                text-align: center;
                align-items: center;
            }

            .left-form-panel h1 {
                font-size: 60px; /* Уменьшаем заголовок на средних экранах */
            }

            .form-group label {
                font-size: 24px;
            }

            .form-group input[type="text"],
            .form-group input[type="tel"] {
                font-size: 18px;
            }

            .form-group input[type="submit"] {
                width: 120px;
                font-size: 20px;
            }

            .right-image-panel {
                width: 100%;
                max-width: 100%;
                border-radius: 0;
                padding: 30px 20px;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                padding: 10px 20px;
            }

            .header-logo {
                margin-bottom: 10px;
                justify-content: center;
            }

            .header-nav {
                display: none; /* Навигация скрыта */
            }

            .search-bar {
                max-width: 100%;
                padding: 10px 20px;
            }

            .search-bar input {
                font-size: 18px;
            }

            .search-bar .search-icon {
                font-size: 24px;
            }

            .footer {
                padding: 20px 20px;
            }
        }
    </style>
</head>
<body>
<header class="header">
        <div class="header-logo">
            <img src="logoDonCofeon.jpg" alt="Логотип Компании"> <!-- Укажите путь к вашему логотипу -->
            <span><a href="file:///C:/Apache24/htdocs/doncofeon/index.html">Дон Кофеон</a></span>
        </div>
        <nav class="header-nav">
            <a href="file:///C:/Apache24/htdocs/doncofeon/menu.html">меню</a>
            <a href="file:///C:/Apache24/htdocs/doncofeon/predzakaz.html">предзаказ</a>
            <a href="file:///C:/Apache24/htdocs/doncofeon/about.html">о нас</a>
        </nav>
        <div class="header-vk-icon">
            <a href="https://vk.com/donkofeone"><img src="https://vk.com/donkofeone"><img src="https://m.vk.com/images/logos/vklogo_400.png" alt="VK"></a> <!-- Иконка VK -->
        </div>
    </header>

    <div class="main-content">
        <div class="left-form-panel">
            <h1>Предзаказ</h1>
            <div class="form-group">
                <label for="name">Ваше имя</label>
                <input type="text" id="name" name="name" placeholder="Введите ваше имя">
            </div>
            <div class="form-group">
                <label for="drink">Название напитка</label>
                <input type="text" id="drink" name="drink" placeholder="Название напитка">
            </div>
            <div class="form-group">
                <label for="address">Адрес</label>
                <input type="text" id="address" name="address" placeholder="Ваш адрес">
            </div>
            <div class="form-group">
                <label for="wishes">Особые пожелания</label>
                <input type="text" id="wishes" name="wishes" placeholder="Особые пожелания">
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (XXX) XXX-XX-XX">
            </div>
            <div class="form-group">
                <input type="submit" value="готово!" onclick="window.location.href='index.html';">
            </div>
        </div>

        <div class="right-image-panel">
            <img src="fon.jpg" alt="Иллюстрация" class="fon-image"> <!-- Изображение fon.png -->
            <img src="map.png" alt="Карта адресов" class="map-image"> <!-- Изображение karta.png -->
        </div>
    </div>

    <footer class="footer">
        <p>&copy; Дон Кофеон 2026</p>
        <p>ВК - @donkofeone</p>
        <p>контактный телефон - +7 (987) 095-03-41</p>
    </footer>
</body>
</html>
